version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/quantforex
      - SECRET_KEY=change-this-in-production-to-32-char-random-string
      - OANDA_API_KEY=${OANDA_API_KEY:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - OANDA_ENVIRONMENT=practice
      - FRONTEND_URL=http://localhost:8000
    volumes:
      - ./app:/app/app
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quantforex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
